<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battleship</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fdf0f5;
  --panel: #fff0f6;
  --cell: #f8d7e8;
  --cell-hover: #f0b8d0;
  --ship: #d4a0c0;
  --hit: #e84393;
  --miss: #b8a9c9;
  --sunk: #fd79a8;
  --text: #6c3461;
  --accent: #e84393;
  --accent2: #a855f7;
  --grid-gap: 2px;
  --cell-size: 36px;
  --border: #e8b4d8;
}
html, body { height: 100%; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 30%, #f3e8ff 70%, #ede9fe 100%);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 10px;
}

/* ===== HEADER ===== */
h1 {
  font-size: 1.8rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #e84393, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 10px 0 5px;
}

/* ===== STATUS BAR ===== */
#status-bar {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 20px;
  margin: 8px 0 12px;
  font-size: 0.95rem;
  text-align: center;
  min-height: 38px;
  max-width: 700px;
  width: 100%;
  box-shadow: 0 2px 8px rgba(232, 67, 147, 0.1);
}

/* ===== SHIP TRAY ===== */
#ship-tray {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  justify-content: center;
  max-width: 700px;
  width: 100%;
  box-shadow: 0 2px 8px rgba(232, 67, 147, 0.1);
}
#ship-tray.hidden { display: none; }
.tray-ship {
  background: linear-gradient(135deg, #f0b8d0, #d4a0c0);
  border: 2px solid transparent;
  border-radius: 8px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 0.85rem;
  color: var(--text);
  font-weight: 600;
  transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
}
.tray-ship:hover { border-color: var(--accent); transform: scale(1.05); box-shadow: 0 2px 10px rgba(232, 67, 147, 0.25); }
.tray-ship.selected { border-color: var(--accent); box-shadow: 0 0 12px rgba(232, 67, 147, 0.4); background: linear-gradient(135deg, #e84393, #a855f7); color: #fff; }
.tray-ship.placed { opacity: 0.4; }
.tray-ship.placed.selected { opacity: 1; }
#tray-controls { display: flex; gap: 8px; margin-left: 8px; }
#tray-controls button {
  background: linear-gradient(135deg, #e84393, #a855f7);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  cursor: pointer;
  font-weight: 700;
  font-size: 0.85rem;
  transition: opacity 0.2s, transform 0.15s;
}
#tray-controls button:hover { opacity: 0.85; transform: scale(1.03); }
#tray-controls button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
#btn-orientation { min-width: 72px; }
.rotate-hint {
  font-size: 0.7rem;
  color: #b06090;
  width: 100%;
  text-align: center;
  margin-top: 2px;
}

/* ===== BOARDS CONTAINER ===== */
#boards {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: flex-start;
}

/* ===== BOARD ===== */
.board-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.board-title {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
}
.board-grid {
  display: grid;
  grid-template-columns: 30px repeat(10, var(--cell-size));
  grid-template-rows: 30px repeat(10, var(--cell-size));
  gap: var(--grid-gap);
  user-select: none;
  background: var(--panel);
  padding: 4px;
  border-radius: 10px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 16px rgba(232, 67, 147, 0.12);
}
.header-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: #b06090;
}
.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  background: var(--cell);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  font-size: 1rem;
  font-weight: 700;
  position: relative;
}
.cell:focus {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
  z-index: 1;
}
.cell.ship { background: var(--ship); }
.cell.ship-carrier { background: #c084a8; }
.cell.ship-battleship { background: #b08cc0; }
.cell.ship-cruiser { background: #a8b0d0; }
.cell.ship-submarine { background: #c0a8b8; }
.cell.ship-destroyer { background: #d0a8a8; }
.cell.ship-bow { border-radius: 10px 5px 5px 10px; }
.cell.ship-stern { border-radius: 5px 10px 10px 5px; }
.cell.ship-bow-v { border-radius: 10px 10px 5px 5px; }
.cell.ship-stern-v { border-radius: 5px 5px 10px 10px; }
.cell.hit { background: var(--hit); color: #fff; }
.cell.miss { background: #ece0f0; color: var(--miss); }
.cell.sunk { background: var(--sunk); color: #fff; }
.cell.preview { background: var(--cell-hover); transform: scale(1.05); }
.cell.preview-invalid { background: #f0a0a0; }

/* AI board cells are clickable during gameplay */
#ai-board .cell:not(.hit):not(.miss):not(.sunk) { cursor: crosshair; }
#ai-board .cell:not(.hit):not(.miss):not(.sunk):hover { background: var(--cell-hover); transform: scale(1.05); }
#ai-board .cell.hit, #ai-board .cell.miss, #ai-board .cell.sunk { cursor: default; }

/* Player board cells during placement */
#player-board .cell:not(.ship) { cursor: pointer; }

/* Hit flash animation */
@keyframes hit-flash {
  0% { background: #fff; transform: scale(1.3); }
  50% { background: #ff6b9d; }
  100% { background: var(--hit); transform: scale(1); }
}
.cell.hit-anim { animation: hit-flash 0.35s ease-out; }

/* Miss dot */
.cell.miss::after {
  content: '';
  width: 10px;
  height: 10px;
  background: var(--miss);
  border-radius: 50%;
  position: absolute;
}

/* ===== OVERLAY ===== */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(253, 240, 245, 0.85);
  backdrop-filter: blur(6px);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
#overlay.visible { display: flex; }
#overlay-box {
  background: #fff;
  border: 2px solid var(--accent);
  border-radius: 16px;
  padding: 40px 50px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(232, 67, 147, 0.2);
}
#overlay-box h2 {
  font-size: 2rem;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #e84393, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#overlay-box .stats {
  font-size: 1rem;
  margin-bottom: 24px;
  line-height: 1.8;
  color: var(--text);
}
#overlay-box button {
  background: linear-gradient(135deg, #e84393, #a855f7);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 30px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}
#overlay-box button:hover { opacity: 0.85; transform: scale(1.03); }

/* ===== RESPONSIVE ===== */
@media (max-width: 820px) {
  :root { --cell-size: 30px; }
  #boards { flex-direction: column; align-items: center; gap: 20px; }
  h1 { font-size: 1.4rem; }
}
@media (max-width: 420px) {
  :root { --cell-size: 26px; }
  .header-cell { font-size: 0.65rem; }
  .board-grid { gap: 1px; }
  #ship-tray { padding: 8px; gap: 5px; }
  .tray-ship { padding: 4px 8px; font-size: 0.75rem; }
}
</style>
</head>
<body>

<h1>Battleship</h1>
<div id="status-bar">Place your ships to begin.</div>

<div id="ship-tray">
  <button class="tray-ship" data-ship="carrier">&#x1F6A2; Carrier (5)</button>
  <button class="tray-ship" data-ship="battleship">&#x26F5; Battleship (4)</button>
  <button class="tray-ship" data-ship="cruiser">&#x1F6E5;&#xFE0F; Cruiser (3)</button>
  <button class="tray-ship" data-ship="submarine">&#x1F433; Submarine (3)</button>
  <button class="tray-ship" data-ship="destroyer">&#x2693; Destroyer (2)</button>
  <div id="tray-controls">
    <button id="btn-orientation" title="Toggle orientation (or right-click board)">&#x2194;&#xFE0F; Horizontal</button>
    <button id="btn-randomise">&#x1F3B2; Randomise</button>
    <button id="btn-start" disabled>&#x2728; Start Game</button>
  </div>
  <div class="rotate-hint">Tip: Right-click on the board to rotate &#x2022; Click a placed ship to move it</div>
</div>

<div id="boards">
  <div class="board-wrapper">
    <div class="board-title">&#x1F338; Your Fleet</div>
    <div id="player-board" class="board-grid" role="grid" aria-label="Player board"></div>
  </div>
  <div class="board-wrapper">
    <div class="board-title">&#x1F52B; Enemy Waters</div>
    <div id="ai-board" class="board-grid" role="grid" aria-label="AI board"></div>
  </div>
</div>

<div id="overlay">
  <div id="overlay-box">
    <h2 id="overlay-title"></h2>
    <div class="stats" id="overlay-stats"></div>
    <button id="btn-play-again">&#x1F504; Play Again</button>
  </div>
</div>

<script>
/* ===== CONSTANTS ===== */
const COLS = 'ABCDEFGHIJ'.split('');
const ROWS = 10;
const SHIPS = {
  carrier:    { name: 'Carrier',    size: 5, emoji: '\u{1F6A2}', color: 'ship-carrier' },
  battleship: { name: 'Battleship', size: 4, emoji: '\u26F5',    color: 'ship-battleship' },
  cruiser:    { name: 'Cruiser',    size: 3, emoji: '\u{1F6E5}\uFE0F', color: 'ship-cruiser' },
  submarine:  { name: 'Submarine',  size: 3, emoji: '\u{1F433}', color: 'ship-submarine' },
  destroyer:  { name: 'Destroyer',  size: 2, emoji: '\u2693',    color: 'ship-destroyer' }
};

/* ===== STATE ===== */
let playerShips = {};   // { shipId: [cellIndices] }
let aiShips = {};
let playerHits = new Set();
let playerMisses = new Set();
let aiHits = new Set();
let aiMisses = new Set();
let playerSunk = new Set();  // sunk cell indices on AI board
let aiSunk = new Set();      // sunk cell indices on player board
let playerSunkShips = [];    // names of player ships that are sunk
let aiSunkShips = [];        // names of AI ships that are sunk
let gameStarted = false;
let gameOver = false;
let playerTurn = true;
let playerShotsFired = 0;
let aiShotsFired = 0;

/* Ship placement state */
let selectedShip = null;
let orientation = 'H';  // H or V
let placedShips = {};    // { shipId: [cellIndices] }
let placedOrientations = {};  // Track orientation for each placed ship
let playerOrientations = {};  // Saved orientations when game starts

/* AI targeting state */
let aiHuntStack = [];    // cells to try next (adjacent to hits)
let aiHitCells = [];     // current chain of hits being tracked
let aiFirstHit = null;

/* Listener cleanup */
let listenerController = null;
let aiTurnTimer = null;
let aiStatusTimer = null;

/* ===== DOM ===== */
const statusBar = document.getElementById('status-bar');
const shipTray = document.getElementById('ship-tray');
const playerBoardEl = document.getElementById('player-board');
const aiBoardEl = document.getElementById('ai-board');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayStats = document.getElementById('overlay-stats');
const btnOrientation = document.getElementById('btn-orientation');
const btnRandomise = document.getElementById('btn-randomise');
const btnStart = document.getElementById('btn-start');
const btnPlayAgain = document.getElementById('btn-play-again');

/* ===== UTILITY ===== */
function idx(r, c) { return r * 10 + c; }
function rowCol(i) { return [Math.floor(i / 10), i % 10]; }
function cellLabel(i) { const [r, c] = rowCol(i); return COLS[c] + (r + 1); }
function inBounds(r, c) { return r >= 0 && r < 10 && c >= 0 && c < 10; }

function getShipCells(startRow, startCol, size, orient) {
  const cells = [];
  for (let i = 0; i < size; i++) {
    const r = orient === 'V' ? startRow + i : startRow;
    const c = orient === 'H' ? startCol + i : startCol;
    if (!inBounds(r, c)) return null;
    cells.push(idx(r, c));
  }
  return cells;
}

function isValidPlacement(cells, existingShips, excludeShipId) {
  const occupied = new Set();
  const buffer = new Set();
  for (const [id, shipCells] of Object.entries(existingShips)) {
    if (id === excludeShipId) continue;
    for (const ci of shipCells) {
      occupied.add(ci);
      const [r, c] = rowCol(ci);
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          if (inBounds(r + dr, c + dc)) buffer.add(idx(r + dr, c + dc));
        }
      }
    }
  }
  for (const ci of cells) {
    if (occupied.has(ci) || buffer.has(ci)) return false;
  }
  return true;
}

function randomPlacement() {
  const ships = {};
  const orientations = {};
  const order = Object.keys(SHIPS);
  for (const id of order) {
    const size = SHIPS[id].size;
    let attempts = 0;
    while (attempts < 1000) {
      const orient = Math.random() < 0.5 ? 'H' : 'V';
      const maxR = orient === 'V' ? 10 - size : 9;
      const maxC = orient === 'H' ? 10 - size : 9;
      const r = Math.floor(Math.random() * (maxR + 1));
      const c = Math.floor(Math.random() * (maxC + 1));
      const cells = getShipCells(r, c, size, orient);
      if (cells && isValidPlacement(cells, ships, null)) {
        ships[id] = cells;
        orientations[id] = orient;
        break;
      }
      attempts++;
    }
  }
  return { ships, orientations };
}

/* ===== BOARD RENDERING ===== */
function createBoard(container, boardId) {
  container.innerHTML = '';
  // Corner
  const corner = document.createElement('div');
  corner.className = 'header-cell';
  container.appendChild(corner);
  // Column headers
  for (let c = 0; c < 10; c++) {
    const h = document.createElement('div');
    h.className = 'header-cell';
    h.textContent = COLS[c];
    container.appendChild(h);
  }
  // Rows
  for (let r = 0; r < 10; r++) {
    // Row header
    const rh = document.createElement('div');
    rh.className = 'header-cell';
    rh.textContent = r + 1;
    container.appendChild(rh);
    // Cells
    for (let c = 0; c < 10; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = idx(r, c);
      cell.dataset.board = boardId;
      cell.setAttribute('role', 'gridcell');
      cell.setAttribute('tabindex', '-1');
      cell.setAttribute('aria-label', COLS[c] + (r + 1));
      container.appendChild(cell);
    }
  }
}

function getCells(container) {
  return container.querySelectorAll('.cell');
}

function renderPlayerBoard() {
  const cells = getCells(playerBoardEl);
  const shipsToRender = gameStarted ? playerShips : placedShips;
  const orientsToRender = gameStarted ? playerOrientations : placedOrientations;

  cells.forEach(cell => {
    const i = parseInt(cell.dataset.index);
    cell.className = 'cell';
    cell.textContent = '';
    cell.style.fontSize = '';
    cell.setAttribute('aria-label', cellLabel(i));

    let onShipId = null;
    for (const [id, shipCells] of Object.entries(shipsToRender)) {
      if (shipCells.includes(i)) { onShipId = id; break; }
    }

    if (aiSunk.has(i)) {
      cell.classList.add('sunk');
      cell.textContent = 'X';
      cell.setAttribute('aria-label', cellLabel(i) + ' - sunk');
    } else if (aiHits.has(i)) {
      cell.classList.add('hit');
      cell.textContent = 'X';
      cell.setAttribute('aria-label', cellLabel(i) + ' - hit');
    } else if (aiMisses.has(i)) {
      cell.classList.add('miss');
      cell.setAttribute('aria-label', cellLabel(i) + ' - miss');
    } else if (onShipId) {
      const shipData = SHIPS[onShipId];
      const shipCells = shipsToRender[onShipId];
      const posInShip = shipCells.indexOf(i);
      const orient = orientsToRender[onShipId] || 'H';

      cell.classList.add('ship', shipData.color);

      if (posInShip === 0) {
        cell.classList.add(orient === 'H' ? 'ship-bow' : 'ship-bow-v');
      } else if (posInShip === shipCells.length - 1) {
        cell.classList.add(orient === 'H' ? 'ship-stern' : 'ship-stern-v');
      }

      const midIdx = Math.floor(shipCells.length / 2);
      if (posInShip === midIdx) {
        cell.textContent = shipData.emoji;
        cell.style.fontSize = '0.9rem';
      }

      cell.setAttribute('aria-label', cellLabel(i) + ' - ' + shipData.name);
    }
  });
}

function renderAIBoard() {
  const cells = getCells(aiBoardEl);
  cells.forEach(cell => {
    const i = parseInt(cell.dataset.index);
    cell.className = 'cell';
    cell.textContent = '';
    cell.setAttribute('aria-label', cellLabel(i));

    if (playerSunk.has(i)) {
      cell.classList.add('sunk');
      cell.textContent = 'X';
      cell.setAttribute('aria-label', cellLabel(i) + ' - sunk');
    } else if (playerHits.has(i)) {
      cell.classList.add('hit');
      cell.textContent = 'X';
      cell.setAttribute('aria-label', cellLabel(i) + ' - hit');
    } else if (playerMisses.has(i)) {
      cell.classList.add('miss');
      cell.setAttribute('aria-label', cellLabel(i) + ' - miss');
    }
  });
}

/* ===== SHIP PLACEMENT ===== */
function initPlacement() {
  placedShips = {};
  placedOrientations = {};
  selectedShip = null;
  orientation = 'H';
  updateOrientationButton();
  updateTrayButtons();
  updateStartButton();
  renderPlayerBoard();
  setStatus('Place your ships to begin.');
}

function updateTrayButtons() {
  document.querySelectorAll('.tray-ship').forEach(btn => {
    const id = btn.dataset.ship;
    btn.classList.toggle('placed', id in placedShips);
    btn.classList.toggle('selected', id === selectedShip);
  });
}

function updateStartButton() {
  btnStart.disabled = Object.keys(placedShips).length < 5;
}

function selectShip(shipId) {
  if (gameStarted) return;
  if (selectedShip === shipId) {
    selectedShip = null;
  } else {
    selectedShip = shipId;
  }
  updateTrayButtons();
  clearPreview();
}

function clearPreview() {
  getCells(playerBoardEl).forEach(cell => {
    cell.classList.remove('preview', 'preview-invalid');
  });
}

function showPreview(startIndex) {
  clearPreview();
  if (!selectedShip || gameStarted) return;
  const size = SHIPS[selectedShip].size;
  const [r, c] = rowCol(startIndex);
  const cells = getShipCells(r, c, size, orientation);
  if (!cells) {
    // Show invalid for what we can
    for (let i = 0; i < size; i++) {
      const pr = orientation === 'V' ? r + i : r;
      const pc = orientation === 'H' ? c + i : c;
      if (inBounds(pr, pc)) {
        const el = playerBoardEl.querySelector(`.cell[data-index="${idx(pr, pc)}"]`);
        if (el) el.classList.add('preview-invalid');
      }
    }
    return;
  }
  const valid = isValidPlacement(cells, placedShips, selectedShip);
  cells.forEach(ci => {
    const el = playerBoardEl.querySelector(`.cell[data-index="${ci}"]`);
    if (el) el.classList.add(valid ? 'preview' : 'preview-invalid');
  });
}

function placeShipAt(startIndex) {
  if (!selectedShip || gameStarted) return;
  const size = SHIPS[selectedShip].size;
  const [r, c] = rowCol(startIndex);
  const cells = getShipCells(r, c, size, orientation);
  if (!cells) return;
  if (!isValidPlacement(cells, placedShips, selectedShip)) return;
  placedShips[selectedShip] = cells;
  placedOrientations[selectedShip] = orientation;
  selectedShip = null;
  updateTrayButtons();
  updateStartButton();
  renderPlayerBoard();
  clearPreview();
}

function pickUpShip(cellIndex) {
  if (gameStarted) return;
  for (const [id, cells] of Object.entries(placedShips)) {
    if (cells.includes(cellIndex)) {
      selectedShip = id;
      if (placedOrientations[id]) {
        orientation = placedOrientations[id];
        updateOrientationButton();
      }
      delete placedShips[id];
      delete placedOrientations[id];
      updateTrayButtons();
      updateStartButton();
      renderPlayerBoard();
      return;
    }
  }
}

/* ===== GAME START ===== */
function startGame() {
  playerShips = { ...placedShips };
  playerOrientations = { ...placedOrientations };
  const aiResult = randomPlacement();
  aiShips = aiResult.ships;
  gameStarted = true;
  gameOver = false;
  playerTurn = true;
  playerShotsFired = 0;
  aiShotsFired = 0;
  playerHits = new Set();
  playerMisses = new Set();
  aiHits = new Set();
  aiMisses = new Set();
  playerSunk = new Set();
  aiSunk = new Set();
  playerSunkShips = [];
  aiSunkShips = [];
  aiHuntStack = [];
  aiHitCells = [];
  aiFirstHit = null;
  shipTray.classList.add('hidden');
  renderPlayerBoard();
  renderAIBoard();
  setStatus('Your turn \u2014 click a cell on the enemy board to fire!');
}

/* ===== PLAYER ATTACK ===== */
function playerFire(cellIndex) {
  if (!gameStarted || gameOver || !playerTurn) return;
  if (playerHits.has(cellIndex) || playerMisses.has(cellIndex) || playerSunk.has(cellIndex)) return;

  playerShotsFired++;
  let hit = false;
  let sunkShipId = null;

  for (const [id, cells] of Object.entries(aiShips)) {
    if (cells.includes(cellIndex)) {
      hit = true;
      playerHits.add(cellIndex);
      // Check if whole ship is sunk
      if (cells.every(c => playerHits.has(c))) {
        sunkShipId = id;
        cells.forEach(c => {
          playerHits.delete(c);
          playerSunk.add(c);
        });
        aiSunkShips.push(SHIPS[id].name);
      }
      break;
    }
  }
  if (!hit) {
    playerMisses.add(cellIndex);
  }

  renderAIBoard();

  // Hit animation
  const cell = aiBoardEl.querySelector(`.cell[data-index="${cellIndex}"]`);
  if (cell && hit) {
    cell.classList.add('hit-anim');
    setTimeout(() => cell.classList.remove('hit-anim'), 350);
  }

  if (sunkShipId) {
    setStatus('You sunk the AI\'s ' + SHIPS[sunkShipId].name + '! ' + SHIPS[sunkShipId].emoji);
  } else if (hit) {
    setStatus('Hit! \u{1F4A5}');
  } else {
    setStatus('Miss \u{1F4A8}');
  }

  // Check win
  if (aiSunkShips.length === 5) {
    endGame(true);
    return;
  }

  playerTurn = false;
  aiTurnTimer = setTimeout(aiTurn, 600);
}

/* ===== AI LOGIC ===== */
function aiTurn() {
  if (gameOver) return;

  const target = aiChooseTarget();
  aiShotsFired++;

  let hit = false;
  let sunkShipId = null;

  for (const [id, cells] of Object.entries(playerShips)) {
    if (cells.includes(target)) {
      hit = true;
      aiHits.add(target);

      // AI targeting: track this hit
      aiHitCells.push(target);
      if (aiFirstHit === null) aiFirstHit = target;

      // Add adjacent cells to hunt stack
      const [r, c] = rowCol(target);
      const adj = [
        inBounds(r - 1, c) ? idx(r - 1, c) : -1,
        inBounds(r + 1, c) ? idx(r + 1, c) : -1,
        inBounds(r, c - 1) ? idx(r, c - 1) : -1,
        inBounds(r, c + 1) ? idx(r, c + 1) : -1
      ].filter(i => i >= 0 && !aiHits.has(i) && !aiMisses.has(i) && !aiSunk.has(i));

      // If we have 2+ hits in a line, prioritize the direction
      if (aiHitCells.length >= 2) {
        const sorted = [...aiHitCells].sort((a, b) => a - b);
        const first = rowCol(sorted[0]);
        const last = rowCol(sorted[sorted.length - 1]);
        if (first[0] === last[0]) {
          // Horizontal line - only add left/right
          const filtered = adj.filter(i => rowCol(i)[0] === first[0]);
          aiHuntStack = aiHuntStack.filter(i => {
            const [ir] = rowCol(i);
            return ir === first[0];
          });
          for (const a of filtered) {
            if (!aiHuntStack.includes(a)) aiHuntStack.push(a);
          }
        } else if (first[1] === last[1]) {
          // Vertical line - only add up/down
          const filtered = adj.filter(i => rowCol(i)[1] === first[1]);
          aiHuntStack = aiHuntStack.filter(i => {
            const [, ic] = rowCol(i);
            return ic === first[1];
          });
          for (const a of filtered) {
            if (!aiHuntStack.includes(a)) aiHuntStack.push(a);
          }
        } else {
          for (const a of adj) {
            if (!aiHuntStack.includes(a)) aiHuntStack.push(a);
          }
        }
      } else {
        for (const a of adj) {
          if (!aiHuntStack.includes(a)) aiHuntStack.push(a);
        }
      }

      // Check sunk
      if (cells.every(c => aiHits.has(c))) {
        sunkShipId = id;
        cells.forEach(c => {
          aiHits.delete(c);
          aiSunk.add(c);
        });
        playerSunkShips.push(SHIPS[id].name);
        // Reset AI hunt state for this ship
        aiHitCells = aiHitCells.filter(h => !cells.includes(h));
        if (aiHitCells.length === 0) {
          aiHuntStack = [];
          aiFirstHit = null;
        } else {
          // Still tracking another ship's hits - rebuild stack
          aiHuntStack = [];
          aiFirstHit = aiHitCells[0];
          for (const h of aiHitCells) {
            const [hr, hc] = rowCol(h);
            const nadj = [
              inBounds(hr - 1, hc) ? idx(hr - 1, hc) : -1,
              inBounds(hr + 1, hc) ? idx(hr + 1, hc) : -1,
              inBounds(hr, hc - 1) ? idx(hr, hc - 1) : -1,
              inBounds(hr, hc + 1) ? idx(hr, hc + 1) : -1
            ].filter(i => i >= 0 && !aiHits.has(i) && !aiMisses.has(i) && !aiSunk.has(i));
            for (const a of nadj) {
              if (!aiHuntStack.includes(a)) aiHuntStack.push(a);
            }
          }
        }
      }
      break;
    }
  }

  if (!hit) {
    aiMisses.add(target);
  }

  renderPlayerBoard();

  // Hit animation on player board
  const cell = playerBoardEl.querySelector(`.cell[data-index="${target}"]`);
  if (cell && hit) {
    cell.classList.add('hit-anim');
    setTimeout(() => cell.classList.remove('hit-anim'), 350);
  }

  if (sunkShipId) {
    setStatus('AI sunk your ' + SHIPS[sunkShipId].name + '!');
  } else if (hit) {
    setStatus('AI hit your ship!');
  } else {
    setStatus('AI missed.');
  }

  // Check win
  if (playerSunkShips.length === 5) {
    endGame(false);
    return;
  }

  playerTurn = true;
  aiStatusTimer = setTimeout(() => {
    if (!gameOver && gameStarted) setStatus('Your turn \u2014 click a cell on the enemy board to fire!');
  }, 800);
}

function aiChooseTarget() {
  // Filter hunt stack to only valid (unfired) cells
  aiHuntStack = aiHuntStack.filter(i => !aiHits.has(i) && !aiMisses.has(i) && !aiSunk.has(i));

  if (aiHuntStack.length > 0) {
    return aiHuntStack.pop();
  }

  // Random hunt - use checkerboard pattern for efficiency
  const available = [];
  for (let i = 0; i < 100; i++) {
    if (!aiHits.has(i) && !aiMisses.has(i) && !aiSunk.has(i)) {
      const [r, c] = rowCol(i);
      if ((r + c) % 2 === 0) available.push(i);
    }
  }
  if (available.length === 0) {
    // Fallback to any unfired cell
    for (let i = 0; i < 100; i++) {
      if (!aiHits.has(i) && !aiMisses.has(i) && !aiSunk.has(i)) available.push(i);
    }
  }
  return available[Math.floor(Math.random() * available.length)];
}

/* ===== WIN / LOSS ===== */
function endGame(playerWins) {
  gameOver = true;
  playerTurn = false;
  const winner = playerWins ? '\u{1F389} You Win!' : 'AI Wins!';
  const shots = playerWins ? playerShotsFired : aiShotsFired;
  const totalHits = 17; // all ships = 5+4+3+3+2
  const accuracy = shots > 0 ? ((totalHits / shots) * 100).toFixed(1) : '0.0';

  overlayTitle.textContent = winner;
  overlayStats.innerHTML =
    (playerWins ? 'Your' : 'AI') + ' shots fired: ' + shots + '<br>' +
    'Accuracy: ' + accuracy + '%';
  overlay.classList.add('visible');
  setStatus(winner);
}

/* ===== RESET ===== */
function resetGame() {
  clearTimeout(aiTurnTimer);
  clearTimeout(aiStatusTimer);
  aiTurnTimer = null;
  aiStatusTimer = null;
  gameStarted = false;
  gameOver = false;
  playerTurn = true;
  playerShips = {};
  playerOrientations = {};
  aiShips = {};
  playerHits = new Set();
  playerMisses = new Set();
  aiHits = new Set();
  aiMisses = new Set();
  playerSunk = new Set();
  aiSunk = new Set();
  playerSunkShips = [];
  aiSunkShips = [];
  playerShotsFired = 0;
  aiShotsFired = 0;
  aiHuntStack = [];
  aiHitCells = [];
  aiFirstHit = null;
  placedShips = {};
  placedOrientations = {};
  selectedShip = null;
  orientation = 'H';
  updateOrientationButton();
  overlay.classList.remove('visible');
  shipTray.classList.remove('hidden');
  createBoard(playerBoardEl, 'player');
  createBoard(aiBoardEl, 'ai');
  attachBoardListeners();
  setInitialTabindex();
  initPlacement();
}

/* ===== STATUS ===== */
function setStatus(msg) {
  statusBar.textContent = msg;
}

/* ===== EVENT LISTENERS ===== */
function attachBoardListeners() {
  // Abort any previous listeners
  if (listenerController) listenerController.abort();
  listenerController = new AbortController();
  const opts = { signal: listenerController.signal };

  playerBoardEl.addEventListener('click', (e) => {
    const cell = e.target.closest('.cell');
    if (!cell) return;
    const i = parseInt(cell.dataset.index);
    if (!gameStarted) {
      if (selectedShip) {
        placeShipAt(i);
      } else {
        pickUpShip(i);
      }
    }
  }, opts);

  // Right-click to rotate during placement
  playerBoardEl.addEventListener('contextmenu', (e) => {
    if (gameStarted) return;
    e.preventDefault();
    toggleOrientation();
    const cell = e.target.closest('.cell');
    if (cell && selectedShip) {
      showPreview(parseInt(cell.dataset.index));
    }
  }, opts);

  playerBoardEl.addEventListener('mouseover', (e) => {
    const cell = e.target.closest('.cell');
    if (!cell || gameStarted) return;
    if (selectedShip) {
      showPreview(parseInt(cell.dataset.index));
    }
  }, opts);

  playerBoardEl.addEventListener('mouseleave', () => {
    if (!gameStarted) clearPreview();
  }, opts);

  aiBoardEl.addEventListener('click', (e) => {
    const cell = e.target.closest('.cell');
    if (!cell) return;
    playerFire(parseInt(cell.dataset.index));
  }, opts);

  document.addEventListener('keydown', handleKeyboard, opts);
}

function handleKeyboard(e) {
  const active = document.activeElement;
  if (!active || !active.classList.contains('cell')) return;

  const boardId = active.dataset.board;
  const currentIdx = parseInt(active.dataset.index);
  const [r, c] = rowCol(currentIdx);
  let newR = r, newC = c;

  switch (e.key) {
    case 'ArrowUp':    newR = Math.max(0, r - 1); e.preventDefault(); break;
    case 'ArrowDown':  newR = Math.min(9, r + 1); e.preventDefault(); break;
    case 'ArrowLeft':  newC = Math.max(0, c - 1); e.preventDefault(); break;
    case 'ArrowRight': newC = Math.min(9, c + 1); e.preventDefault(); break;
    case 'Enter':
    case ' ':
      e.preventDefault();
      if (boardId === 'ai' && gameStarted) {
        playerFire(currentIdx);
      } else if (boardId === 'player' && !gameStarted) {
        if (selectedShip) {
          placeShipAt(currentIdx);
        } else {
          pickUpShip(currentIdx);
        }
      }
      return;
    case 'r':
    case 'R':
      if (!gameStarted) {
        toggleOrientation();
        if (selectedShip) showPreview(currentIdx);
      }
      return;
    default: return;
  }

  const newIdx = idx(newR, newC);
  const container = boardId === 'player' ? playerBoardEl : aiBoardEl;
  const newCell = container.querySelector(`.cell[data-index="${newIdx}"]`);
  if (newCell) {
    newCell.setAttribute('tabindex', '0');
    newCell.focus();
    active.setAttribute('tabindex', '-1');
    if (boardId === 'player' && !gameStarted && selectedShip) {
      showPreview(newIdx);
    }
  }
}

function toggleOrientation() {
  orientation = orientation === 'H' ? 'V' : 'H';
  updateOrientationButton();
}

function updateOrientationButton() {
  if (orientation === 'H') {
    btnOrientation.innerHTML = '&#x2194;&#xFE0F; Horizontal';
  } else {
    btnOrientation.innerHTML = '&#x2195;&#xFE0F; Vertical';
  }
}

/* Tray ship buttons */
document.querySelectorAll('.tray-ship').forEach(btn => {
  btn.addEventListener('click', () => selectShip(btn.dataset.ship));
});

btnOrientation.addEventListener('click', toggleOrientation);

btnRandomise.addEventListener('click', () => {
  if (gameStarted) return;
  const result = randomPlacement();
  placedShips = result.ships;
  placedOrientations = result.orientations;
  selectedShip = null;
  updateTrayButtons();
  updateStartButton();
  renderPlayerBoard();
  clearPreview();
  setStatus('Ships placed randomly. Click Start Game or reposition them.');
});

btnStart.addEventListener('click', () => {
  if (Object.keys(placedShips).length === 5) startGame();
});

btnPlayAgain.addEventListener('click', resetGame);

/* Make first cell of each board focusable for keyboard nav */
function setInitialTabindex() {
  const pc = playerBoardEl.querySelector('.cell[data-index="0"]');
  const ac = aiBoardEl.querySelector('.cell[data-index="0"]');
  if (pc) pc.setAttribute('tabindex', '0');
  if (ac) ac.setAttribute('tabindex', '0');
}

/* ===== INIT ===== */
createBoard(playerBoardEl, 'player');
createBoard(aiBoardEl, 'ai');
attachBoardListeners();
setInitialTabindex();
initPlacement();
</script>
